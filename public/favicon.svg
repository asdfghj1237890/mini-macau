<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="16" fill="#1a1a2e"/>
  <g fill="none" stroke="#e8d5a3" stroke-width="2" stroke-linecap="round">
    <!-- Cross on top -->
    <line x1="50" y1="10" x2="50" y2="20"/>
    <line x1="46" y1="14" x2="54" y2="14"/>
    <!-- Layer 1 (top, narrowest) - triangular pediment -->
    <polygon points="42,22 58,22 55,20 50,17 45,20" fill="#e8d5a3" stroke="none"/>
    <line x1="42" y1="22" x2="58" y2="22"/>
    <line x1="44" y1="22" x2="44" y2="30"/>
    <line x1="50" y1="22" x2="50" y2="30"/>
    <line x1="56" y1="22" x2="56" y2="30"/>
    <!-- Layer 2 -->
    <line x1="38" y1="30" x2="62" y2="30"/>
    <line x1="40" y1="30" x2="40" y2="42"/>
    <line x1="46" y1="30" x2="46" y2="42"/>
    <line x1="54" y1="30" x2="54" y2="42"/>
    <line x1="60" y1="30" x2="60" y2="42"/>
    <!-- Round window in center -->
    <circle cx="50" cy="36" r="3.5" fill="#1a1a2e" stroke="#e8d5a3" stroke-width="1.5"/>
    <!-- Layer 3 -->
    <line x1="34" y1="42" x2="66" y2="42"/>
    <line x1="36" y1="42" x2="36" y2="56"/>
    <line x1="42" y1="42" x2="42" y2="56"/>
    <line x1="50" y1="42" x2="50" y2="56"/>
    <line x1="58" y1="42" x2="58" y2="56"/>
    <line x1="64" y1="42" x2="64" y2="56"/>
    <!-- Layer 4 -->
    <line x1="30" y1="56" x2="70" y2="56"/>
    <line x1="32" y1="56" x2="32" y2="72"/>
    <line x1="40" y1="56" x2="40" y2="72"/>
    <line x1="50" y1="56" x2="50" y2="72"/>
    <line x1="60" y1="56" x2="60" y2="72"/>
    <line x1="68" y1="56" x2="68" y2="72"/>
    <!-- Door arches -->
    <path d="M43,72 L43,64 A4,4 0 0 1 51,64 L51,72" fill="#1a1a2e" stroke="#e8d5a3" stroke-width="1.5"/>
    <!-- Layer 5 (base, widest) -->
    <line x1="26" y1="72" x2="74" y2="72"/>
    <line x1="28" y1="72" x2="28" y2="88"/>
    <line x1="38" y1="72" x2="38" y2="88"/>
    <line x1="50" y1="72" x2="50" y2="88"/>
    <line x1="62" y1="72" x2="62" y2="88"/>
    <line x1="72" y1="72" x2="72" y2="88"/>
    <!-- Ground line -->
    <line x1="24" y1="88" x2="76" y2="88" stroke-width="2.5"/>
  </g>
</svg>
