<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="16" fill="#1a1a2e"/>
  <!-- Ruins of St. Paul's facade -->
  <g fill="#e8d5a3" stroke="#c4a96a" stroke-width="0.8">
    <!-- Top cross -->
    <rect x="47" y="12" width="6" height="10" rx="1"/>
    <rect x="44" y="15" width="12" height="4" rx="1"/>
    <!-- Top pediment -->
    <polygon points="35,25 65,25 62,22 38,22"/>
    <!-- Upper tier columns -->
    <rect x="36" y="25" width="4" height="12"/>
    <rect x="44" y="25" width="4" height="12"/>
    <rect x="52" y="25" width="4" height="12"/>
    <rect x="60" y="25" width="4" height="12"/>
    <!-- Second tier beam -->
    <rect x="33" y="37" width="34" height="3" rx="0.5"/>
    <!-- Second tier columns -->
    <rect x="34" y="40" width="4" height="14"/>
    <rect x="42" y="40" width="4" height="14"/>
    <rect x="54" y="40" width="4" height="14"/>
    <rect x="62" y="40" width="4" height="14"/>
    <!-- Window -->
    <rect x="47" y="42" width="6" height="8" rx="1" fill="#1a1a2e" stroke="#c4a96a"/>
    <!-- Third tier beam -->
    <rect x="30" y="54" width="40" height="3" rx="0.5"/>
    <!-- Third tier columns -->
    <rect x="31" y="57" width="5" height="16"/>
    <rect x="40" y="57" width="5" height="16"/>
    <rect x="55" y="57" width="5" height="16"/>
    <rect x="64" y="57" width="5" height="16"/>
    <!-- Door arches -->
    <rect x="46" y="60" width="8" height="13" rx="4" fill="#1a1a2e" stroke="#c4a96a"/>
    <!-- Base beam -->
    <rect x="27" y="73" width="46" height="3" rx="0.5"/>
    <!-- Base columns -->
    <rect x="28" y="76" width="6" height="12"/>
    <rect x="38" y="76" width="6" height="12"/>
    <rect x="56" y="76" width="6" height="12"/>
    <rect x="66" y="76" width="6" height="12"/>
    <!-- Ground -->
    <rect x="25" y="88" width="50" height="3" rx="1"/>
  </g>
</svg>
