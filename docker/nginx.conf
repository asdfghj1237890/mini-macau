resolver 1.1.1.1 8.8.8.8 ipv6=off valid=300s;
resolver_timeout 5s;

map $sent_http_content_type $cache_control {
  default                         "public, max-age=3600";
  ~*^text/html                    "no-cache";
  ~*^application/javascript       "public, max-age=31536000, immutable";
  ~*^text/css                     "public, max-age=31536000, immutable";
}

server {
  listen 80 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;

  add_header Cache-Control $cache_control always;
  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options DENY always;
  add_header Referrer-Policy no-referrer-when-downgrade always;

  # DSAT bus realtime reverse proxy (strips CORS + adds required Referer).
  location /api/dsat/ {
    set $dsat_upstream bis.dsat.gov.mo;
    proxy_pass https://$dsat_upstream/macauweb/;
    proxy_ssl_server_name on;
    proxy_ssl_name $dsat_upstream;
    proxy_set_header Host $dsat_upstream;
    proxy_set_header Referer "https://bis.dsat.gov.mo/macauweb/";
    proxy_set_header User-Agent $http_user_agent;
    proxy_set_header Accept "application/json, text/plain, */*";
    proxy_set_header Accept-Language "zh-HK,zh;q=0.9,en;q=0.8";
    proxy_hide_header Access-Control-Allow-Origin;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Cache-Control "no-store" always;
    proxy_connect_timeout 5s;
    proxy_send_timeout 10s;
    proxy_read_timeout 10s;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
