resolver 1.1.1.1 8.8.8.8 ipv6=off valid=300s;
resolver_timeout 5s;

# 184 bus routes × 2 dirs worst case; bump ceiling so capture_multi can
# fan out the full set in a single batch without tripping the default 200.
lua_max_subrequests 500;

proxy_cache_path /var/cache/nginx/dsat levels=1:2 keys_zone=dsat_cache:10m
                 max_size=100m inactive=10m use_temp_path=off;

map $sent_http_content_type $cache_control {
  default                         "public, max-age=3600";
  ~*^text/html                    "no-cache";
  ~*^application/javascript       "public, max-age=31536000, immutable";
  ~*^text/css                     "public, max-age=31536000, immutable";
}

server {
  listen 80 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_comp_level 5;
  gzip_min_length 256;
  gzip_proxied any;
  gzip_vary on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;

  add_header Cache-Control $cache_control always;
  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options DENY always;
  add_header Referrer-Policy no-referrer-when-downgrade always;

  # DSAT bus realtime reverse proxy (strips CORS + adds required Referer).
  # Shared cache with 8s TTL + request coalescing shelters upstream from
  # burst and lets the browser reuse responses across polls/tabs.
  location /api/dsat/ {
    proxy_pass https://bis.dsat.gov.mo/macauweb/;
    proxy_ssl_server_name on;
    proxy_ssl_name bis.dsat.gov.mo;
    proxy_set_header Host bis.dsat.gov.mo;
    proxy_set_header Referer "https://bis.dsat.gov.mo/macauweb/";
    proxy_set_header User-Agent $http_user_agent;
    proxy_set_header Accept "application/json, text/plain, */*";
    proxy_set_header Accept-Language "zh-HK,zh;q=0.9,en;q=0.8";
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Cache-Control;
    proxy_hide_header Expires;
    proxy_hide_header Set-Cookie;
    proxy_hide_header Pragma;

    proxy_cache dsat_cache;
    proxy_cache_key "$request_uri";
    proxy_cache_valid 200 8s;
    proxy_cache_lock on;
    proxy_cache_lock_timeout 5s;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    proxy_cache_background_update on;
    proxy_ignore_headers Cache-Control Set-Cookie Expires;

    add_header Access-Control-Allow-Origin "*" always;
    add_header Cache-Control "public, max-age=8" always;
    add_header X-Cache-Status $upstream_cache_status always;

    proxy_connect_timeout 5s;
    proxy_send_timeout 10s;
    proxy_read_timeout 10s;
  }

  # Batch fan-out: accept a single `routes=NAME:DIR,NAME:DIR,...` request,
  # issue the per-route subrequests concurrently via ngx.location.capture_multi,
  # and return one JSON array. Subrequests target /api/dsat/routestation/bus
  # above, so they inherit the shared 8 s proxy_cache + request coalescing.
  location /api/dsat/batch {
    default_type application/json;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Cache-Control "no-store" always;

    content_by_lua_block {
      local cjson = require "cjson.safe"
      local args = ngx.req.get_uri_args(600)
      local routes_str = args.routes or ""
      if routes_str == "" then
        ngx.status = 400
        ngx.say('{"error":"missing routes param"}')
        return
      end

      local reqs, keys = {}, {}
      for pair in string.gmatch(routes_str, "[^,]+") do
        local name, dir = string.match(pair, "^([%w_%-%.]+):([01])$")
        if name and dir then
          reqs[#reqs+1] = {
            "/api/dsat/routestation/bus",
            { args = "routeName=" .. ngx.escape_uri(name) .. "&dir=" .. dir },
          }
          keys[#keys+1] = name .. ":" .. dir
        end
      end

      if #reqs == 0 then
        ngx.status = 400
        ngx.say('{"error":"no valid routes"}')
        return
      end

      local resps = { ngx.location.capture_multi(reqs) }
      local out = {}
      for i, r in ipairs(resps) do
        local decoded
        if r.status == 200 and r.body and #r.body > 0 then
          decoded = cjson.decode(r.body)
        end
        out[i] = { key = keys[i], status = r.status, data = decoded }
      end

      ngx.say(cjson.encode(out))
    }
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
