name: Ferry Schedules

on:
  schedule:
    - cron: '0 0 1 * *' # 1st of each month, 00:00 UTC (08:00 Macau)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: latest

      - name: Scrape Turbojet ferry schedules
        working-directory: data
        run: uv run python scripts/fetch_ferry_schedules.py

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet public/data/ferry-schedules.json && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/ferry-schedules.json
          git commit -m "chore: update ferry schedules"
          git push
