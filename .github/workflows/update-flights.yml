name: Update Flight Data

on:
  schedule:
    - cron: '0 20 * * *' # UTC 20:00 = Macau 04:00 (UTC+8)
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: latest

      - name: Fetch MFM flight data (with retry)
        working-directory: data
        # Outer retry on top of fetch_page's in-process 3-attempt retry.
        # If the script still exits non-zero (safety guard tripped — 0 rows
        # parsed across both timetables) we wait 60s and try once more.
        # Covers the "upstream flaked for a minute straight" window seen on
        # 2026-04-21 20:25 UTC without overwriting flights.json with [].
        run: |
          attempt=1
          max_attempts=2
          until uv run python scripts/fetch_flights.py; do
            if [ $attempt -ge $max_attempts ]; then
              echo "::error::fetch_flights.py failed after $attempt attempts"
              exit 1
            fi
            echo "::warning::fetch_flights.py attempt $attempt failed — retrying in 60s"
            sleep 60
            attempt=$((attempt + 1))
          done
        env:
          AVIATIONSTACK_API_KEY: ${{ secrets.AVIATIONSTACK_API_KEY }}
          UPSTREAM_DEP_EN_URL: ${{ secrets.UPSTREAM_DEP_EN_URL }}
          UPSTREAM_DEP_ZH_URL: ${{ secrets.UPSTREAM_DEP_ZH_URL }}
          UPSTREAM_ARR_EN_URL: ${{ secrets.UPSTREAM_ARR_EN_URL }}
          UPSTREAM_ARR_ZH_URL: ${{ secrets.UPSTREAM_ARR_ZH_URL }}

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet public/data/flights.json && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/flights.json
          git commit -m "chore: update MFM flight data"
          git push
