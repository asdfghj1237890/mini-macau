name: Bus Service Status

on:
  schedule:
    - cron: '0 23 * * *' # UTC 23:00 = Macau 07:00 (UTC+8)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: latest

      - name: Scrape today's service status
        working-directory: data
        run: uv run python scripts/fetch_service_status.py

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet public/service-status.json && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/service-status.json
          git commit -m "chore: update bus service status"
          git push
